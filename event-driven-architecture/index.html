<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <script src="src/main.ts" type="module"></script>
    <link rel="icon" type="image/x-icon" href="/logo.png" />

    <title>Sandbox / ETA</title>
  </head>
  <body>
    <main class="h-screen">
      <section class="w-full p-10 flex items-stretch gap-5 h-full">
        <div
          class="w-2/3 max-w-7xl mx-auto border-2 border-black rounded-2xl p-5 flex flex-col gap-5 items-center overflow-y-scroll"
        >
          <div
            data-section="buttons"
            class="w-full border-2 border-black rounded-xl p-5 flex flex-col gap-3"
          >
            <p class="text-center text-2xl font-semibold">Buttons</p>
            <div class="flex items-center gap-3 mx-auto">
              <button
                id="eta-button-increment"
                class="bg-white px-4 py-2 border-2 border-black rounded-xl cursor-pointer transition-colors duration-300 hover:bg-gray-100"
              >
                Increment (+2)
              </button>
              <button
                id="eta-button-decrement"
                class="bg-white px-4 py-2 border-2 border-black rounded-xl cursor-pointer transition-colors duration-300 hover:bg-gray-100"
              >
                Decrement (-2)
              </button>
            </div>
            <p
              class="text-xl font-semibold flex justify-center items-center gap-2"
            >
              Value:
              <span id="eta-button-value" class="text-xl font-semibold">0</span>
            </p>
          </div>
          <div
            data-section="form"
            class="w-full border-2 border-black rounded-xl p-5 flex flex-col gap-3"
          >
            <p class="text-center text-2xl font-semibold">Form</p>
            <form action="get" id="eta-form" class="w-full">
              <div class="w-full flex flex-col gap-10">
                <div class="w-full max-w-1/2 mx-auto flex flex-col gap-3">
                  <label class="font-semibold" for="eta-form-name">Name</label>
                  <input
                    type="text"
                    id="eta-form-name"
                    name="name"
                    autocomplete="name"
                    class="border-b-2 border-black px-2 py-1 focus-visible:outline-0"
                    placeholder="Your name"
                  />
                </div>
                <div class="w-full max-w-1/2 mx-auto flex flex-col gap-3">
                  <label class="font-semibold" for="eta-form-email"
                    >Email</label
                  >
                  <input
                    type="email"
                    id="eta-form-email"
                    name="email"
                    autocomplete="email"
                    class="border-b-2 border-black px-2 py-1 focus-visible:outline-0"
                    placeholder="Your email"
                  />
                </div>
                <div class="w-full max-w-1/2 mx-auto flex justify-center">
                  <button
                    type="submit"
                    id="eta-form-submit"
                    class="border-2 border-black rounded-2xl py-2 px-8 cursor-pointer bg-white transition-colors duration-300 hover:bg-gray-100"
                  >
                    Submit
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
        <div
          class="w-1/3 border-2 border-black rounded-2xl p-5 flex flex-col gap-3 max-h-screen overflow-y-scroll"
        >
          <p class="text-2xl font-semibold text-center">Logs</p>
          <ul id="eta-logs" class="w-full"></ul>
        </div>
      </section>
    </main>
  </body>
</html>
